<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Get Your Gutter Estimate - Mo City Gutters & Remodeling</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800&family=Open+Sans:wght@400;600&display=swap">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="/styles/main.css">
    <style>
        .estimate-page {
            padding-top: 120px;
            padding-bottom: 80px;
            background: #f9fafb;
        }
        
        .estimate-container {
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
        }
        
        .widget-container {
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 2px 15px rgba(0, 0, 0, 0.08);
        }
        
        .form-step {
            display: none;
        }
        
        .form-step.active {
            display: block;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        .form-control {
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 5px;
            width: 100%;
        }
        
        .btn {
            padding: 12px 30px;
            border-radius: 5px;
            font-weight: 600;
            margin: 10px 5px;
        }
        
        .btn-primary {
            background-color: var(--primary-color);
            border-color: var(--primary-color);
            color: white;
        }
        
        .btn-secondary {
            background-color: #6c757d;
            border-color: #6c757d;
            color: white;
        }
        
        .estimate-result {
            text-align: center;
            padding: 30px;
            background: #f8f9fa;
            border-radius: 8px;
            margin-top: 20px;
        }
        
        .estimate-amount {
            font-size: 2.5em;
            color: var(--primary-color);
            font-weight: bold;
            margin: 20px 0;
        }
        
        .estimate-note {
            color: #666;
            font-style: italic;
        }
    </style>
</head>
<body>
    <section class="estimate-page">
        <div class="section-header">
            <h1>Get Your Instant Estimate</h1>
            <p>Calculate your gutter project cost in seconds</p>
        </div>
        <div class="estimate-container">
            <div class="widget-container">
                <form id="estimateForm">
                    <!-- Step 1: Project Details -->
                    <div id="step1" class="form-step active">
                        <h4 class="mb-4">Project Details</h4>
                        <div class="form-group">
                            <label for="gutterType">Gutter Type</label>
                            <select class="form-control" id="gutterType" required>
                                <option value="">Select Gutter Type</option>
                                <option value="standard">Standard 5" K-Style</option>
                                <option value="premium">Premium 6" K-Style</option>
                                <option value="custom">Custom Box Gutters</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label for="linearFeet">Linear Feet of Gutters Needed</label>
                            <input type="number" class="form-control" id="linearFeet" required min="1">
                        </div>
                        <div class="form-group">
                            <label for="stories">Number of Stories</label>
                            <select class="form-control" id="stories" required>
                                <option value="1">1 Story</option>
                                <option value="2">2 Stories</option>
                                <option value="3">3 Stories</option>
                            </select>
                        </div>
                        <button type="button" class="btn btn-primary" onclick="nextStep(1)">Next</button>
                    </div>

                    <!-- Step 2: Additional Services -->
                    <div id="step2" class="form-step">
                        <h4 class="mb-4">Additional Services</h4>
                        <div class="form-group">
                            <div class="form-check">
                                <input type="checkbox" class="form-check-input" id="cleaningService">
                                <label class="form-check-label" for="cleaningService">Professional Gutter Cleaning</label>
                            </div>
                        </div>
                        <div class="form-group">
                            <div class="form-check">
                                <input type="checkbox" class="form-check-input" id="gutterGuards">
                                <label class="form-check-label" for="gutterGuards">Gutter Guard Installation</label>
                            </div>
                        </div>
                        <div class="form-group">
                            <div class="form-check">
                                <input type="checkbox" class="form-check-input" id="repairService">
                                <label class="form-check-label" for="repairService">Fascia/Soffit Repair</label>
                            </div>
                        </div>
                        <button type="button" class="btn btn-secondary" onclick="previousStep(2)">Previous</button>
                        <button type="button" class="btn btn-primary" onclick="nextStep(2)">Next</button>
                    </div>

                    <!-- Step 3: Contact Information -->
                    <div id="step3" class="form-step">
                        <h4 class="mb-4">Your Information</h4>
                        <div class="form-group">
                            <label for="name">Full Name</label>
                            <input type="text" class="form-control" id="name" required>
                        </div>
                        <div class="form-group">
                            <label for="email">Email</label>
                            <input type="email" class="form-control" id="email" required>
                        </div>
                        <div class="form-group">
                            <label for="phone">Phone</label>
                            <input type="tel" class="form-control" id="phone" required>
                        </div>
                        <div class="form-group">
                            <label for="address">Property Address</label>
                            <input type="text" class="form-control" id="address" required>
                        </div>
                        <button type="button" class="btn btn-secondary" onclick="previousStep(3)">Previous</button>
                        <button type="submit" class="btn btn-primary">Get Estimate</button>
                    </div>
                </form>

                <div id="estimateResult" class="estimate-result" style="display: none;">
                    <h3>Your Estimate</h3>
                    <div class="estimate-amount"></div>
                    <p class="estimate-note">This is an approximate estimate. Final pricing may vary based on specific project requirements.</p>
                    <button type="button" class="btn btn-primary" onclick="startOver()">Start Over</button>
                </div>
            </div>
        </div>
    </section>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/scripts/estimate-calculator.js"></script>
    <script src="/scripts/pricing-calculator.js"></script>
    <script>
        // Form navigation functions
        function nextStep(currentStep) {
            document.getElementById(`step${currentStep}`).classList.remove('active');
            document.getElementById(`step${currentStep + 1}`).classList.add('active');
        }

        function previousStep(currentStep) {
            document.getElementById(`step${currentStep}`).classList.remove('active');
            document.getElementById(`step${currentStep - 1}`).classList.add('active');
        }

        function startOver() {
            document.getElementById('estimateForm').reset();
            document.getElementById('estimateResult').style.display = 'none';
            document.getElementById('step1').classList.add('active');
            document.getElementById('step2').classList.remove('active');
            document.getElementById('step3').classList.remove('active');
        }

        // Pricing configuration
        const PRICING = {
            gutterTypes: {
                standard: { base: 8.50, name: "Standard 5\" K-Style" },
                premium: { base: 12.00, name: "Premium 6\" K-Style" },
                custom: { base: 18.00, name: "Custom Box Gutters" }
            },
            storyMultiplier: {
                "1": 1.0,
                "2": 1.3,
                "3": 1.6
            },
            additionalServices: {
                cleaningService: { base: 150, name: "Professional Gutter Cleaning" },
                gutterGuards: { base: 8.00, name: "Gutter Guard Installation" },
                repairService: { base: 300, name: "Fascia/Soffit Repair" }
            }
        };

        // Handle form submission
        document.getElementById('estimateForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const length = parseFloat(document.getElementById('linearFeet').value);
            const stories = document.getElementById('stories').value;
            const gutterType = document.getElementById('gutterType').value;
            
            // Calculate base cost
            let total = length * PRICING.gutterTypes[gutterType].base;
            
            // Apply story multiplier
            total *= PRICING.storyMultiplier[stories];
            
            // Add additional services
            if (document.getElementById('cleaningService').checked) {
                total += PRICING.additionalServices.cleaningService.base;
            }
            if (document.getElementById('gutterGuards').checked) {
                total += length * PRICING.additionalServices.gutterGuards.base;
            }
            if (document.getElementById('repairService').checked) {
                total += PRICING.additionalServices.repairService.base;
            }
            
            // Display result
            document.querySelector('.estimate-amount').textContent = `$${total.toFixed(2)}`;
            document.getElementById('estimateResult').style.display = 'block';
            document.getElementById('step3').classList.remove('active');
        });
    </script>
</body>
</html>
